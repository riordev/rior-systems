<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting Rior Systems...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
    }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1 id="status">Connecting your store...</h1>
    <p id="message">Please wait while we complete the authentication.</p>
  </div>

  <script>
    // Parse tokens from URL hash or query params
    const url = new URL(window.location.href);
    const hash = window.location.hash.substring(1);
    const hashParams = new URLSearchParams(hash);
    
    const accessToken = hashParams.get('access_token') || url.searchParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token') || url.searchParams.get('refresh_token');
    const expiresIn = hashParams.get('expires_in') || url.searchParams.get('expires_in');
    const error = hashParams.get('error') || url.searchParams.get('error');

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const spinner = document.getElementById('spinner');

    if (error) {
      statusEl.textContent = 'Connection Failed';
      statusEl.className = 'error';
      messageEl.textContent = `Error: ${error}`;
      spinner.style.display = 'none';
    } else if (accessToken) {
      // Store tokens
      chrome.storage.sync.set({
        accessToken,
        refreshToken,
        tokenExpiry: Date.now() + (parseInt(expiresIn || '3600') * 1000),
        storeConnected: true
      }, () => {
        statusEl.textContent = 'Connected!';
        statusEl.className = 'success';
        messageEl.textContent = 'Your store is now linked. You can close this tab.';
        spinner.style.display = 'none';
        
        // Close window after 2 seconds
        setTimeout(() => {
          window.close();
        }, 2000);
      });
    } else {
      statusEl.textContent = 'Connection Failed';
      statusEl.className = 'error';
      messageEl.textContent = 'No access token received. Please try again.';
      spinner.style.display = 'none';
    }
  </script>
</body>
</html>
