<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rior Systems</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="glass-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Rior Systems</span>
      </div>
      <div class="status-indicator" id="connectionStatus">
        <span class="dot offline"></span>
      </div>
    </div>

    <!-- Not Logged In State -->
    <div id="notLoggedIn" class="state-view">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h2>Connect Your Store</h2>
        <p>Link your Shopify store to unlock real-time profit intelligence and alerts.</p>
        <button class="btn-primary" id="connectBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 12l2 2 4-4"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
          Connect Store
        </button>
      </div>
    </div>

    <!-- Logged In Dashboard -->
    <div id="dashboard" class="state-view hidden">
      <!-- Yesterday's Metrics -->
      <div class="metrics-section">
        <div class="section-label">Yesterday</div>
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-label">Revenue</div>
            <div class="metric-value" id="yesterdayRevenue">—</div>
          </div>
          <div class="metric-card profit">
            <div class="metric-label">Profit</div>
            <div class="metric-value" id="yesterdayProfit">—</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">ROAS</div>
            <div class="metric-value" id="yesterdayRoas">—</div>
          </div>
        </div>
      </div>

      <!-- Alerts Section -->
      <div class="alerts-section" id="alertsSection">
        <div class="section-label">
          Alerts
          <span class="badge" id="alertCount">0</span>
        </div>
        <div class="alerts-list" id="alertsList">
          <div class="alert-item">
            <span class="alert-dot"></span>
            <span class="alert-text">No active alerts</span>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="actions-section">
        <div class="section-label">Quick Actions</div>
        <div class="action-buttons">
          <a href="https://app.rior.systems/dashboard" target="_blank" class="action-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            Dashboard
          </a>
          <button class="action-btn" id="viewAlertsBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            Alerts
          </button>
          <a href="https://cal.com/rior/systems-review" target="_blank" class="action-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Book Call
          </a>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button class="link-btn" id="refreshBtn">Refresh</button>
        <button class="link-btn danger" id="disconnectBtn">Disconnect</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
