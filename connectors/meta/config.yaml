# Meta Marketing API Connector Configuration

# Ad account IDs to extract data from
# If empty, connector will fetch all accessible accounts
ad_accounts:
  # - "act_123456789"  # Replace with your ad account IDs
  # - "act_987654321"

# BigQuery configuration
bigquery:
  project: "rior-prod"
  dataset: "rior_prod"
  table: "ad_spend"

# Extraction settings
extraction:
  # Fields to fetch from insights API
  fields:
    - spend
    - impressions
    - clicks
    - conversions
  
  # Breakdowns (daily, by campaign)
  breakdowns:
    - day
    - campaign
